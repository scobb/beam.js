name: Initialize Wiki

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Configure git
        run: |
          git config --global user.email "ralph@keylightdigital.com"
          git config --global user.name "Ralph (Keylight Digital)"
          git config --global init.defaultBranch master

      - name: Try to initialize wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          
          # Clone or initialize
          if git clone "${WIKI_URL}" wiki-repo 2>&1; then
            echo "Wiki already initialized, using existing repo"
          else
            echo "Wiki not initialized, creating from scratch"
            mkdir -p wiki-repo
            git -C wiki-repo init
            git -C wiki-repo remote add origin "${WIKI_URL}"
          fi
          
          # Create Home.md
          cat > wiki-repo/Home.md << 'EOF'
# Beam — Privacy-First Web Analytics

Welcome to the official documentation wiki for **[Beam](https://beam-privacy.com)** — a cookie-free, GDPR-compliant web analytics service.

## Quick Links

- [Live Demo](https://beam-privacy.com/demo)
- [Sign Up Free](https://beam-privacy.com/signup)
- [API Documentation](https://beam-privacy.com/docs/api)
- [How It Works](https://beam-privacy.com/how-it-works)

## Wiki Pages

- [Getting Started](Getting-Started) — Install in under 5 minutes
- [Privacy Design](Privacy-Design) — Cookie-free tracking explained
- [API Reference](API-Reference) — Stats API and custom events
- [Comparison with Alternatives](Comparison-with-Alternatives) — Beam vs Plausible, Fathom, Matomo
EOF
          
          cd wiki-repo
          git add Home.md
          git commit -m "Add Home wiki page" 2>&1 || echo "Nothing to commit"
          git push origin master --force 2>&1
          echo "Push complete!"

