name: Initialize Wiki (Auto)

on:
  workflow_dispatch:
  schedule:
    # Run every 6 hours — auto-pushes wiki pages once Steve initializes the wiki via web UI
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  push-wiki-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config --global user.email "ralph@keylightdigital.com"
          git config --global user.name "Ralph (Keylight Digital)"

      - name: Push wiki pages (if wiki is initialized)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"

          # Check if wiki is initialized — exit 0 if not (scheduled runs should not fail)
          if ! git clone "${WIKI_URL}" wiki-repo 2>/dev/null; then
            echo "Wiki not yet initialized. Waiting for Steve to visit:"
            echo "  https://github.com/${REPO}/wiki/_new"
            echo "Once initialized, this workflow will auto-push all pages on its next run."
            echo "Or trigger manually: gh workflow run 'Initialize Wiki (Auto)' --repo ${REPO}"
            exit 0
          fi

          # Check if pages were already pushed (idempotent)
          if [ -f "wiki-repo/Getting-Started.md" ] && [ -f "wiki-repo/API-Reference.md" ]; then
            echo "Wiki pages already exist — nothing to do."
            exit 0
          fi

          # Copy wiki pages from wiki-content/
          cp wiki-content/Home.md wiki-repo/Home.md
          cp wiki-content/Getting-Started.md wiki-repo/Getting-Started.md
          cp wiki-content/Privacy-Design.md wiki-repo/Privacy-Design.md
          cp wiki-content/API-Reference.md wiki-repo/API-Reference.md
          cp wiki-content/Comparison-with-Alternatives.md wiki-repo/Comparison-with-Alternatives.md

          cd wiki-repo
          git add -A
          git commit -m "Add Beam wiki: Getting Started, Privacy Design, API Reference, Comparison with Alternatives"
          git push origin master
          echo ""
          echo "SUCCESS: All wiki pages published!"
          echo "View at: https://github.com/${REPO}/wiki"