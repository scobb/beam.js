name: Initialize Wiki

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Configure git
        run: |
          git config --global user.email "ralph@keylightdigital.com"
          git config --global user.name "Ralph (Keylight Digital)"
          git config --global init.defaultBranch master

      - name: Initialize wiki repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"
          
          # Try to clone; if repo does not exist, init from scratch
          if ! git clone "${WIKI_URL}" wiki-repo; then
            mkdir -p wiki-repo
            git -C wiki-repo init
            git -C wiki-repo remote add origin "${WIKI_URL}"
          fi

      - name: Create wiki pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"
          
          printf '%s\n' \
            '# Beam — Privacy-First Web Analytics' \
            '' \
            'Welcome to the official documentation wiki for **[Beam](https://beam-privacy.com)**.' \
            '' \
            '## Quick Links' \
            '' \
            '- [Live Demo](https://beam-privacy.com/demo)' \
            '- [Sign Up Free](https://beam-privacy.com/signup)' \
            '- [API Documentation](https://beam-privacy.com/docs/api)' \
            '- [How It Works](https://beam-privacy.com/how-it-works)' \
            '' \
            '## Wiki Pages' \
            '' \
            '- [Getting Started](Getting-Started)' \
            '- [Privacy Design](Privacy-Design)' \
            '- [API Reference](API-Reference)' \
            '- [Comparison with Alternatives](Comparison-with-Alternatives)' \
            > wiki-repo/Home.md

          cd wiki-repo
          git add Home.md
          git commit -m "Initialize wiki with Home page" || echo "Nothing to commit"
          git push origin master --force
          echo "SUCCESS: Wiki initialized!"
