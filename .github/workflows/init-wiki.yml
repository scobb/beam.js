name: Initialize Wiki

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  push-wiki-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config --global user.email "ralph@keylightdigital.com"
          git config --global user.name "Ralph (Keylight Digital)"

      - name: Push wiki pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"

          # Check if wiki is initialized
          if ! git clone "${WIKI_URL}" wiki-repo 2>/dev/null; then
            echo "ERROR: Wiki is not initialized yet."
            echo "Steve: please visit https://github.com/${REPO}/wiki/_new"
            echo "Create a page titled 'Home' with any content, then re-run this workflow."
            exit 1
          fi

          # Copy wiki pages from wiki-content/
          cp wiki-content/Home.md wiki-repo/Home.md
          cp wiki-content/Getting-Started.md wiki-repo/Getting-Started.md
          cp wiki-content/Privacy-Design.md wiki-repo/Privacy-Design.md
          cp wiki-content/API-Reference.md wiki-repo/API-Reference.md
          cp wiki-content/Comparison-with-Alternatives.md wiki-repo/Comparison-with-Alternatives.md

          cd wiki-repo
          git add -A
          git commit -m "Add Beam wiki: Getting Started, Privacy Design, API Reference, Comparison with Alternatives"
          git push origin master
          echo ""
          echo "SUCCESS: All wiki pages published!"
          echo "View at: https://github.com/${REPO}/wiki"
